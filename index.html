<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Incident Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for data dumps */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); rounded-lg; }
        ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(16, 185, 129, 0.8); }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800 via-gray-950 to-black text-slate-300 min-h-screen font-sans antialiased flex flex-col items-center justify-center p-6 selection:bg-emerald-500/30">

    <div id="login-section" class="bg-white/5 backdrop-blur-xl p-8 rounded-2xl shadow-[0_0_50px_rgba(16,185,129,0.05)] border border-white/10 w-full max-w-md transform transition-all">
        <div class="flex justify-center mb-6">
            <svg class="w-12 h-12 text-emerald-500 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
        </div>
        <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-8 text-center tracking-tight">System Login</h2>
        
        <input type="email" id="email" placeholder="Email Address" class="w-full mb-4 p-3.5 rounded-xl bg-black/40 border border-white/10 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 text-white placeholder-slate-500 transition-all">
        <input type="password" id="password" placeholder="Password" class="w-full mb-8 p-3.5 rounded-xl bg-black/40 border border-white/10 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 text-white placeholder-slate-500 transition-all">
        
        <button onclick="login()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-emerald-500/25 transition-all transform hover:-translate-y-0.5">Authenticate Terminal</button>
        <p id="login-error" class="text-red-400 mt-4 text-center text-sm font-medium hidden">Access Denied. Invalid credentials.</p>
    </div>

    <div id="dashboard-section" class="hidden w-full max-w-3xl">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight">Secure Dashboard</h1>
            <div class="flex items-center gap-4 bg-white/5 px-4 py-2 rounded-full border border-white/10 backdrop-blur-sm">
                <span id="user-role-badge" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-slate-800 text-slate-300 border border-white/5"></span>
                <button onclick="logout()" class="text-slate-400 hover:text-red-400 text-sm font-semibold transition-colors">Disconnect</button>
            </div>
        </div>

        <div class="bg-white/5 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-white/10 mb-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 rounded-full bg-emerald-500/10 blur-3xl"></div>
            
            <h2 class="text-xl font-semibold mb-6 text-white flex items-center gap-2">
                <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                Log New Incident
            </h2>
            <input type="text" id="title" placeholder="Incident Title (e.g., Exposed API Key)" class="w-full mb-4 p-3.5 rounded-xl bg-black/40 border border-white/10 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 text-white placeholder-slate-500 transition-all">
            <textarea id="desc" placeholder="Detailed description of the vulnerability..." rows="4" class="w-full mb-6 p-3.5 rounded-xl bg-black/40 border border-white/10 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 text-white placeholder-slate-500 transition-all resize-none"></textarea>
            <button onclick="submitIncident()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-emerald-500/25 transition-all">Submit Secure Report</button>
            <p id="success-msg" class="text-emerald-400 mt-4 text-center text-sm font-medium hidden">Incident securely logged to database.</p>
        </div>

        <div id="admin-panel" class="hidden bg-white/5 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-purple-500/30 mb-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 rounded-full bg-purple-500/10 blur-3xl"></div>
            
            <h2 class="text-xl font-semibold mb-6 text-purple-400 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                God Mode: Admin Controls
            </h2>
            
            <div class="flex flex-col sm:flex-row gap-4 mb-8">
                <button onclick="fetchAdminIncidents()" class="flex-1 bg-white/5 hover:bg-white/10 border border-purple-500/30 hover:border-purple-400/50 text-purple-300 font-semibold py-3 rounded-xl transition-all">View All Data</button>
                <button onclick="fetchAuditLogs()" class="flex-1 bg-white/5 hover:bg-white/10 border border-purple-500/30 hover:border-purple-400/50 text-purple-300 font-semibold py-3 rounded-xl transition-all">View Audit Tripwires</button>
            </div>

            <div class="border-t border-white/5 pt-6">
                <h3 class="text-sm font-medium text-slate-400 mb-3 uppercase tracking-wider">Provision User Account</h3>
                <div class="flex flex-col sm:flex-row gap-3 mb-2">
                    <input type="email" id="new-user-email" placeholder="New Email" class="flex-1 p-3 rounded-xl bg-black/40 border border-white/10 focus:outline-none focus:ring-1 focus:ring-purple-500 text-white text-sm">
                    <input type="password" id="new-user-password" placeholder="Temp Password" class="flex-1 p-3 rounded-xl bg-black/40 border border-white/10 focus:outline-none focus:ring-1 focus:ring-purple-500 text-white text-sm">
                    <button onclick="createNewUser()" class="bg-purple-600 hover:bg-purple-500 text-white font-semibold py-3 px-6 rounded-xl transition-colors text-sm">Create</button>
                </div>
                <p id="provision-msg" class="text-xs font-medium hidden mt-2"></p>
            </div>

            <div class="border-t border-white/5 pt-6 mt-6">
                <h3 class="text-sm font-medium text-slate-400 mb-3 uppercase tracking-wider">Elevate Privileges</h3>
                <div class="flex gap-3 mb-2">
                    <input type="email" id="promote-email" placeholder="Target User Email" class="flex-1 p-3 rounded-xl bg-black/40 border border-white/10 focus:outline-none focus:ring-1 focus:ring-yellow-500 text-white text-sm">
                    <button onclick="promoteToAdmin()" class="bg-yellow-600/80 hover:bg-yellow-500 text-white font-semibold py-3 px-6 rounded-xl transition-colors text-sm backdrop-blur-sm">Make Admin</button>
                </div>
                <p id="promote-msg" class="text-xs font-medium hidden mt-2"></p>
            </div>

            <div class="border-t border-red-500/20 pt-6 mt-6">
                <h3 class="text-sm font-medium text-red-400 mb-3 uppercase tracking-wider flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    Danger Zone: Update My Credentials
                </h3>
                <div class="flex flex-col sm:flex-row gap-3 mb-2">
                    <input type="email" id="update-my-email" placeholder="New Email (Optional)" class="flex-1 p-3 rounded-xl bg-black/40 border border-red-500/20 focus:outline-none focus:ring-1 focus:ring-red-500 text-white text-sm">
                    <input type="password" id="update-my-password" placeholder="New Password (Optional)" class="flex-1 p-3 rounded-xl bg-black/40 border border-red-500/20 focus:outline-none focus:ring-1 focus:ring-red-500 text-white text-sm">
                    <button onclick="updateMyCredentials()" class="bg-red-600/80 hover:bg-red-500 text-white font-semibold py-3 px-6 rounded-xl transition-colors text-sm backdrop-blur-sm">Update</button>
                </div>
            </div>

            <pre id="admin-data-display" class="mt-8 p-5 bg-black/60 border border-white/5 rounded-xl text-xs text-emerald-400 overflow-x-auto hidden font-mono shadow-inner"></pre>
        </div>
    </div>

    <script>
        const baseURL = "http://127.0.0.1:8000";

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            const formData = new URLSearchParams();
            formData.append("username", email);
            formData.append("password", password);

            const response = await fetch(`${baseURL}/users/login`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem("token", data.access_token);
                
                document.getElementById("login-section").classList.add("opacity-0", "scale-95");
                setTimeout(() => {
                    document.getElementById("login-section").classList.add("hidden");
                    document.getElementById("dashboard-section").classList.remove("hidden");
                    document.getElementById("dashboard-section").classList.add("animate-fade-in");
                }, 200);
                document.getElementById("login-error").classList.add("hidden");
                loadUserProfile();
            } else {
                document.getElementById("login-error").classList.remove("hidden");
            }
        }

        async function loadUserProfile() {
            const token = localStorage.getItem("token");
            if (!token) return;

            const response = await fetch(`${baseURL}/users/me`, {
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (response.ok) {
                const user = await response.json();
                const badge = document.getElementById("user-role-badge");
                badge.innerText = `ROLE: ${user.role}`;

                if (user.role === "admin") {
                    document.getElementById("admin-panel").classList.remove("hidden");
                    badge.classList.remove("bg-slate-800", "text-slate-300", "border-white/5");
                    badge.classList.add("bg-purple-500/20", "text-purple-300", "border-purple-500/30");
                }
            } else {
                logout(); 
            }
        }

        async function submitIncident() {
            const title = document.getElementById("title").value;
            const desc = document.getElementById("desc").value;
            const token = localStorage.getItem("token");

            const response = await fetch(`${baseURL}/incidents/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify({ title: title, description: desc })
            });

            if (response.ok) {
                document.getElementById("success-msg").classList.remove("hidden");
                document.getElementById("title").value = "";
                document.getElementById("desc").value = "";
                setTimeout(() => document.getElementById("success-msg").classList.add("hidden"), 3000);
            } else {
                alert("Session expired or unauthorized. Please log in again.");
                logout();
            }
        }

        function logout() {
            localStorage.removeItem("token");
            document.getElementById("dashboard-section").classList.add("hidden");
            document.getElementById("login-section").classList.remove("hidden", "opacity-0", "scale-95");
        }

        if (localStorage.getItem("token")) {
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("dashboard-section").classList.remove("hidden");
            loadUserProfile();
        }

        async function fetchAdminIncidents() {
            const token = localStorage.getItem("token");
            const response = await fetch(`${baseURL}/admin/incidents/`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await response.json();
            const display = document.getElementById("admin-data-display");
            display.classList.remove("hidden");
            display.innerText = JSON.stringify(data, null, 2); 
        }

        async function fetchAuditLogs() {
            const token = localStorage.getItem("token");
            const response = await fetch(`${baseURL}/admin/logs/`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await response.json();
            const display = document.getElementById("admin-data-display");
            display.classList.remove("hidden");
            display.innerText = JSON.stringify(data, null, 2);
        }

        async function createNewUser() {
            const emailInput = document.getElementById("new-user-email");
            const passwordInput = document.getElementById("new-user-password");
            const msgBox = document.getElementById("provision-msg");

            const response = await fetch(`${baseURL}/users/`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: emailInput.value, password: passwordInput.value })
            });

            msgBox.classList.remove("hidden");

            if (response.ok) {
                msgBox.className = "text-emerald-400 mt-2 text-xs";
                msgBox.innerText = `Success! Account created for ${emailInput.value}.`;
                emailInput.value = "";
                passwordInput.value = "";
            } else {
                msgBox.className = "text-red-400 mt-2 text-xs";
                msgBox.innerText = "Error: Could not create account. Email may already exist.";
            }
        }

        async function promoteToAdmin() {
            const email = document.getElementById("promote-email").value;
            const token = localStorage.getItem("token");
            const msgBox = document.getElementById("promote-msg");

            const response = await fetch(`${baseURL}/admin/promote/`, {
                method: "PUT",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ email: email })
            });

            msgBox.classList.remove("hidden");
            if (response.ok) {
                msgBox.className = "text-yellow-400 mt-2 text-xs";
                msgBox.innerText = `Success! Privileges elevated for ${email}.`;
                document.getElementById("promote-email").value = "";
            } else {
                msgBox.className = "text-red-400 mt-2 text-xs";
                msgBox.innerText = "Error: Could not find user.";
            }
        }

        async function updateMyCredentials() {
            const newEmail = document.getElementById("update-my-email").value;
            const newPassword = document.getElementById("update-my-password").value;
            const token = localStorage.getItem("token");

            let payload = {};
            if (newEmail) payload.email = newEmail;
            if (newPassword) payload.password = newPassword;

            const response = await fetch(`${baseURL}/users/me/update`, {
                method: "PUT",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Account updated successfully! Disconnecting active session.");
                logout(); 
            } else {
                alert("Failed to update account.");
            }
        }
    </script>
</body>
</html>
