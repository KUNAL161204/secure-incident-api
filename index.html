<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Incident Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div id="login-section" class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
        <h2 class="text-3xl font-bold text-blue-400 mb-6 text-center">System Login</h2>
        <input type="email" id="email" placeholder="Email Address" class="w-full mb-4 p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
        <input type="password" id="password" placeholder="Password" class="w-full mb-6 p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded transition-colors">Authenticate</button>
        <p id="login-error" class="text-red-400 mt-4 text-center hidden">Invalid credentials.</p>
    </div>

    <div id="dashboard-section" class="hidden w-full max-w-2xl">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-emerald-400">Secure Dashboard</h1>
            <div class="flex items-center gap-4">
                <span id="user-role-badge" class="px-3 py-1 rounded text-sm font-bold bg-gray-700 text-gray-300"></span>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded transition-colors">Logout</button>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-300">Report New Incident</h2>
            <input type="text" id="title" placeholder="Incident Title" class="w-full mb-4 p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-emerald-500">
            <textarea id="desc" placeholder="Detailed description..." rows="3" class="w-full mb-4 p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-emerald-500"></textarea>
            <button onclick="submitIncident()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded transition-colors">Submit Report</button>
            <p id="success-msg" class="text-emerald-400 mt-4 text-center hidden">Incident securely logged!</p>
        </div>

        <div id="admin-panel" class="hidden bg-gray-800 p-6 rounded-xl shadow-2xl border border-purple-600 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-purple-400">👑 Admin Controls</h2>
            
            <div class="flex gap-4 mb-8">
                <button onclick="fetchAdminIncidents()" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded transition-colors">View All Incidents</button>
                <button onclick="fetchAuditLogs()" class="flex-1 bg-purple-800 hover:bg-purple-700 text-white font-bold py-3 rounded transition-colors">View Audit Logs</button>
            </div>

            <div class="border-t border-purple-800 pt-6">
                <h3 class="text-lg font-semibold text-purple-300 mb-4">Provision New User Account</h3>
                <div class="flex flex-col sm:flex-row gap-4 mb-2">
                    <input type="email" id="new-user-email" placeholder="New Employee Email" class="flex-1 p-3 rounded bg-gray-900 border border-purple-800 focus:outline-none focus:border-purple-500">
                    <input type="password" id="new-user-password" placeholder="Temporary Password" class="flex-1 p-3 rounded bg-gray-900 border border-purple-800 focus:outline-none focus:border-purple-500">
                    <button onclick="createNewUser()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-6 rounded transition-colors">Create User</button>
                </div>
                <p id="provision-msg" class="text-sm font-bold hidden"></p>
            </div>

            <pre id="admin-data-display" class="mt-6 p-4 bg-gray-900 rounded text-sm text-gray-300 overflow-x-auto hidden"></pre>
        </div>
    </div>

    <script>
        // Javascript to handle the API connection
        const baseURL = "http://127.0.0.1:8000";
        // NEW FUNCTION: Check who the user is and adapt the screen
        async function loadUserProfile() {
            const token = localStorage.getItem("token");
            if (!token) return;

            // Ask the backend: "Who owns this token?"
            const response = await fetch(`${baseURL}/users/me`, {
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (response.ok) {
                const user = await response.json();
                
                // Show their role badge at the top
                document.getElementById("user-role-badge").innerText = `Role: ${user.role.toUpperCase()}`;

                // THE MAGIC: If they are an admin, unhide the secret panel!
                if (user.role === "admin") {
                    document.getElementById("admin-panel").classList.remove("hidden");
                    // Change the badge color to purple so they know they have power
                    document.getElementById("user-role-badge").classList.add("bg-purple-600", "text-white");
                }
            } else {
                logout(); // If the token is fake or expired, kick them out
            }
        }
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            // FastAPI expects form data for login
            const formData = new URLSearchParams();
            formData.append("username", email);
            formData.append("password", password);

            const response = await fetch(`${baseURL}/users/login`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                // Store the JWT token securely in the browser
                localStorage.setItem("token", data.access_token);
                
                // Hide login, show dashboard
                document.getElementById("login-section").classList.add("hidden");
                document.getElementById("dashboard-section").classList.remove("hidden");
                document.getElementById("login-error").classList.add("hidden");
                loadUserProfile();
            } else {
                document.getElementById("login-error").classList.remove("hidden");
            }
        }

        async function submitIncident() {
            const title = document.getElementById("title").value;
            const desc = document.getElementById("desc").value;
            const token = localStorage.getItem("token");

            const response = await fetch(`${baseURL}/incidents/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}` // Show our JWT Passport!
                },
                body: JSON.stringify({ title: title, description: desc })
            });

            if (response.ok) {
                document.getElementById("success-msg").classList.remove("hidden");
                document.getElementById("title").value = "";
                document.getElementById("desc").value = "";
                setTimeout(() => document.getElementById("success-msg").classList.add("hidden"), 3000);
            } else {
                alert("Session expired or unauthorized. Please log in again.");
                logout();
            }
        }

        function logout() {
            localStorage.removeItem("token");
            document.getElementById("dashboard-section").classList.add("hidden");
            document.getElementById("login-section").classList.remove("hidden");
        }

        // Auto-login if token already exists
        if (localStorage.getItem("token")) {
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("dashboard-section").classList.remove("hidden");
            loadUserProfile(); // <-- ADD THIS LINE
        }
        async function fetchAdminIncidents() {
            const token = localStorage.getItem("token");
            const response = await fetch(`${baseURL}/admin/incidents/`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await response.json();
            const display = document.getElementById("admin-data-display");
            display.classList.remove("hidden");
            display.innerText = JSON.stringify(data, null, 2); // Makes the JSON look pretty
        }

        async function fetchAuditLogs() {
            const token = localStorage.getItem("token");
            const response = await fetch(`${baseURL}/admin/logs/`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await response.json();
            const display = document.getElementById("admin-data-display");
            display.classList.remove("hidden");
            display.innerText = JSON.stringify(data, null, 2);
        }
        // NEW FUNCTION: Admin creating a new user
        async function createNewUser() {
            const emailInput = document.getElementById("new-user-email");
            const passwordInput = document.getElementById("new-user-password");
            const msgBox = document.getElementById("provision-msg");

            // Ping the existing backend registration route
            const response = await fetch(`${baseURL}/users/`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: emailInput.value, password: passwordInput.value })
            });

            msgBox.classList.remove("hidden");

            if (response.ok) {
                // Success!
                msgBox.className = "text-emerald-400 mt-2 text-sm";
                msgBox.innerText = `Success! Account created for ${emailInput.value}.`;
                
                // Clear the boxes for the next one
                emailInput.value = "";
                passwordInput.value = "";
            } else {
                // Usually means the email is already in the database
                msgBox.className = "text-red-400 mt-2 text-sm";
                msgBox.innerText = "Error: Could not create account. Email may already exist.";
            }
        }
    </script>
</body>
</html>
